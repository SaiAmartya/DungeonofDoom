# Pings the Render deployment every 10 minutes so the free instance
# never idles long enough to spin down (Render sleeps after ~15 min).
# Note: GitHub pauses scheduled workflows after ~60 days without repo
# activity — re-enable from the Actions tab if that happens.
name: Keep Render awake

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -fsS --retry 3 --retry-all-errors --max-time 120 \
            https://dungeonofdoom.onrender.com/healthz
